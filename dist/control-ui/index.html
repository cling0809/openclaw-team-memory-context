    <script>
      (function () {
        var THEMES = { claw: 1, knot: 1, dash: 1 };
        var MODES = { system: 1, light: 1, dark: 1 };
        var LEGACY = {
          dark: "claw:dark",
          light: "claw:light",
          openknot: "knot:dark",
          fieldmanual: "dash:dark",
          clawdash: "dash:light",
          system: "claw:system",
        };
        try {
          var keys = Object.keys(localStorage);
          var raw;
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf("openclaw.control.settings.v1") === 0) {
              raw = localStorage.getItem(keys[i]);
              if (raw) break;
            }
          }
          if (!raw) return;
          var s = JSON.parse(raw);
          var t = s && s.theme;
          var m = s && s.themeMode;
          if (typeof t !== "string") t = "";
          if (typeof m !== "string") m = "";
          var legacy = LEGACY[t];
          var theme = THEMES[t] ? t : legacy ? legacy.split(":")[0] : "claw";
          var mode = MODES[m] ? m : legacy ? legacy.split(":")[1] : "system";
          if (mode === "system") {
            mode = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          var resolved =
            theme === "knot"
              ? mode === "light"
                ? "openknot-light"
                : "openknot"
              : theme === "dash"
                ? mode === "light"
                  ? "dash-light"
                  : "dash"
                : mode === "light"
                  ? "light"
                  : "dark";
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.setAttribute(
            "data-theme-mode",
            resolved.indexOf("light") !== -1 ? "light" : "dark",
          );
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        function normalizeGatewayUrl(raw) {
          var value = (raw || "").trim();
          if (!value) return "default";
          try {
            var base = location.protocol + "//" + location.host + (location.pathname || "/");
            var parsed = new URL(value, base);
            var path = parsed.pathname === "/" ? "" : parsed.pathname.replace(/\/+$/, "") || parsed.pathname;
            return parsed.protocol + "//" + parsed.host + path;
          } catch (e) {
            return value;
          }
        }

        function parseHashToken() {
          try {
            var hash = window.location.hash || "";
            if (!hash || hash.indexOf("token=") === -1) return "";
            return new URLSearchParams(hash.replace(/^#/, "")).get("token") || "";
          } catch (e) {
            return "";
          }
        }

        function currentGatewayUrl() {
          var ws = location.protocol === "https:" ? "wss" : "ws";
          return ws + "://" + location.host;
        }

        try {
          var token = parseHashToken();
          if (!token) return;
          var gatewayUrl = currentGatewayUrl();
          var normalized = normalizeGatewayUrl(gatewayUrl);
          var sessionKey = "main";
          var storage = {
            gatewayUrl: gatewayUrl,
            sessionKey: sessionKey,
            lastActiveSessionKey: sessionKey,
            theme: "claw",
            themeMode: "system",
            chatFocusMode: false,
            chatShowThinking: true,
            chatShowToolCalls: true,
            splitRatio: 0.6,
            navCollapsed: false,
            navWidth: 220,
            navGroupsCollapsed: {},
            borderRadius: 50,
            sessionsByGateway: {}
          };
          storage.sessionsByGateway[normalized] = {
            sessionKey: sessionKey,
            lastActiveSessionKey: sessionKey
          };
          try {
            localStorage.setItem("openclaw.control.settings.v1:" + normalized, JSON.stringify(storage));
            localStorage.setItem("openclaw.control.settings.v1", JSON.stringify(storage));
          } catch (e) {}
          try {
            sessionStorage.removeItem("openclaw.control.token.v1");
            sessionStorage.setItem("openclaw.control.token.v1:" + normalized, token);
          } catch (e) {}
        } catch (e) {}
      })();
    </script>

    <script type="module">
      const PANEL_ASSET_VERSION = "public-buliang-ui-20260407-ui2026.4.2";
      const PANEL_SCRIPTS = [
        `./assets/teamTaskStore.js?t=${PANEL_ASSET_VERSION}`,
        `./assets/buli-team-panel.js?t=${PANEL_ASSET_VERSION}`,
      ];
      const PANEL_STYLE = `./assets/panel-layout-overrides.css?t=${PANEL_ASSET_VERSION}`;

      function hasWorkbenchShell() {
        return !!document.querySelector(".shell, main, aside.right-console");
      }

      function mountPanelAssets() {
        if (window.__OPENCLAW_PANEL_ASSETS_LOADED__ === PANEL_ASSET_VERSION) return true;
        window.__OPENCLAW_PANEL_ASSETS_LOADED__ = PANEL_ASSET_VERSION;
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.crossOrigin = "";
        link.href = PANEL_STYLE;
        document.head.appendChild(link);
        for (const src of PANEL_SCRIPTS) {
          import(src).catch((err) => {
            console.error("[panel-loader] failed to import", src, err);
          });
        }
        return true;
      }

      let attempts = 0;
      const timer = setInterval(() => {
        attempts += 1;
        if (hasWorkbenchShell() && mountPanelAssets()) {
          clearInterval(timer);
        } else if (attempts > 80) {
          clearInterval(timer);
        }
      }, 250);

      window.addEventListener("DOMContentLoaded", () => {
        if (hasWorkbenchShell()) {
          mountPanelAssets();
        }
      });
    </script>
